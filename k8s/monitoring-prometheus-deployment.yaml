apiVersion: apps/v1
kind: Deployment
metadata:
  name: travelforge-prometheus
  namespace: travelforge
  labels:
    app.kubernetes.io/name: travelforge-prometheus
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: travelforge-prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: travelforge-prometheus
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: prometheus
          image: prom/prometheus:v3.5.2
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: travelforge-config
          command:
            - sh
            - -c
            - |
              exec /bin/prometheus \
                --config.file=/etc/prometheus/prometheus.yml \
                --storage.tsdb.path=/prometheus \
                --web.enable-lifecycle \
                --web.external-url="${PROMETHEUS_EXTERNAL_URL}" \
                --web.route-prefix=/prometheus
          ports:
            - containerPort: 9090
              name: http
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
              readOnly: true
            - name: data
              mountPath: /prometheus
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /prometheus/-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /prometheus/-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: travelforge-prometheus-config
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
