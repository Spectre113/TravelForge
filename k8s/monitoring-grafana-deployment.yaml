apiVersion: apps/v1
kind: Deployment
metadata:
  name: travelforge-grafana
  namespace: travelforge
  labels:
    app.kubernetes.io/name: travelforge-grafana
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: travelforge-grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: travelforge-grafana
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: grafana
          image: grafana/grafana-oss:13.0.1
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SERVER_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: travelforge-config
                  key: PUBLIC_HOST
            - name: GF_SERVER_ROOT_URL
              valueFrom:
                configMapKeyRef:
                  name: travelforge-config
                  key: GRAFANA_ROOT_URL
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SECURITY_COOKIE_SECURE
              value: "false"
          envFrom:
            - secretRef:
                name: travelforge-grafana-admin
          ports:
            - containerPort: 3000
              name: http
          securityContext:
            runAsNonRoot: true
            runAsUser: 472
            runAsGroup: 472
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /grafana/api/health
              port: 3000
            failureThreshold: 120
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /grafana/api/health
              port: 3000
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /grafana/api/health
              port: 3000
            failureThreshold: 3
            periodSeconds: 20
            timeoutSeconds: 2
            initialDelaySeconds: 0
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          emptyDir: {}
        - name: dashboards
          configMap:
            name: travelforge-grafana-dashboard
        - name: datasources
          configMap:
            name: travelforge-grafana-datasources
        - name: dashboard-provider
          configMap:
            name: travelforge-grafana-dashboard-provider
        - name: tmp
          emptyDir: {}