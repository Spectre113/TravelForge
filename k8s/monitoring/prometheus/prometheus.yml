global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: travelforge-backend
    metrics_path: /metrics/prometheus
    static_configs:
      - targets:
          - travelforge-backend:5000

  - job_name: prometheus
    metrics_path: /prometheus/metrics
    static_configs:
      - targets:
          - localhost:9090
